<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  /* Instrument panel: dark, near-opaque, compact. The timecode is the hero.
     This window is capture-excluded, so it can stay full size. */
  :root {
    --bg: rgba(13, 14, 17, 0.96); --line: #2e3138; --text: #e8e9eb;
    --muted: #9aa0a8; --live: #ff4545;
    --mono: "Cascadia Mono", ui-monospace, Consolas, monospace;
  }
  * { box-sizing: border-box; user-select: none; }
  body { margin: 0; overflow: hidden; }
  .bar {
    display: flex; align-items: center; gap: 4px; height: 64px;
    background: var(--bg); border: 1px solid var(--line); border-radius: 14px;
    padding: 0 14px; color: var(--text); font: 13px system-ui;
  }
  .drag { flex: 0 0 10px; height: 100%; cursor: grab; }
  .time {
    font-family: var(--mono); font-variant-numeric: tabular-nums;
    font-size: 26px; font-weight: 600; letter-spacing: 0.02em;
    margin: 0 10px 0 2px; min-width: 106px; text-align: center;
  }
  .time .dot {
    display: inline-block; width: 10px; height: 10px; border-radius: 50%;
    background: var(--live); margin-right: 7px; vertical-align: 2px;
    animation: pulse 1.6s ease infinite;
  }
  .paused .time .dot { background: var(--muted); animation: none; }
  .paused .time { color: var(--muted); }
  @keyframes pulse { 50% { opacity: 0.35; } }
  button {
    background: none; border: none; border-radius: 9px; color: var(--text);
    width: 42px; height: 42px; display: flex; align-items: center;
    justify-content: center; cursor: pointer; position: relative;
  }
  button:hover { background: rgba(255, 255, 255, 0.09); }
  button svg { width: 20px; height: 20px; fill: currentColor; }
  button.stop { color: var(--live); }
  button.active { color: #a78bfa; background: rgba(167, 139, 250, 0.12); }
  button .tip {
    position: absolute; bottom: 46px; left: 50%; transform: translateX(-50%);
    background: #22252b; border: 1px solid var(--line); border-radius: 6px;
    padding: 2px 8px; font-size: 11.5px; white-space: nowrap; display: none;
    color: var(--text);
  }
  button:hover .tip { display: block; }
  .sep { width: 1px; height: 26px; background: var(--line); margin: 0 4px; }
  .confirm {
    position: fixed; inset: 0; background: var(--bg); border-radius: 14px;
    display: none; align-items: center; justify-content: center; gap: 10px;
    font: 13.5px system-ui; color: var(--text); border: 1px solid var(--line);
  }
  .confirm.show { display: flex; }
  .confirm button {
    width: auto; height: 32px; padding: 0 14px; font: 600 13px system-ui;
    border: 1px solid var(--line);
  }
  .confirm .yes { background: var(--live); border: none; color: #fff; }
</style>
</head>
<body>
  <div class="bar" id="bar">
    <div class="drag pywebview-drag-region"></div>
    <span class="time" id="time"><span class="dot"></span>0:00</span>
    <button class="stop" id="stop"><span class="tip">Stop — link goes to clipboard</span>
      <svg viewBox="0 0 24 24"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
    </button>
    <button id="pause"><span class="tip">Pause</span>
      <svg id="icoPause" viewBox="0 0 24 24"><path d="M7 5h4v14H7zm6 0h4v14h-4z"/></svg>
      <svg id="icoResume" viewBox="0 0 24 24" style="display:none"><path d="M8 5v14l11-7z"/></svg>
    </button>
    <div class="sep"></div>
    <button id="trash"><span class="tip">Trash take — no link, nothing uploads</span>
      <svg viewBox="0 0 24 24"><path d="M9 3h6l1 2h4v2H4V5h4l1-2zm-3 6h12l-1 12a2 2 0 0 1-2 2H9a2 2 0 0 1-2-2L6 9z"/></svg>
    </button>
    <button id="restart"><span class="tip">Restart take</span>
      <svg viewBox="0 0 24 24"><path d="M12 5V2L7 6l5 4V7a5 5 0 1 1-5 5H5a7 7 0 1 0 7-7z"/></svg>
    </button>
    <div class="sep"></div>
    <button id="draw"><span class="tip">Draw on screen (Ctrl+Alt+D)</span>
      <svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.8 9.94l-3.75-3.75L3 17.25zM20.7 7a1 1 0 0 0 0-1.4L18.4 3.3a1 1 0 0 0-1.4 0l-1.8 1.8 3.75 3.75L20.7 7z"/></svg>
    </button>
    <button id="cam"><span class="tip">Camera on/off</span>
      <svg viewBox="0 0 24 24"><path d="M17 10.5V7a1 1 0 0 0-1-1H4a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-3.5l4 4v-11l-4 4z"/></svg>
    </button>
    <button id="blur"><span class="tip">Background blur</span>
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><circle cx="12" cy="12" r="8" fill="none" stroke="currentColor" stroke-width="1.6" stroke-dasharray="3 3"/></svg>
    </button>
  </div>
  <div class="confirm" id="confirm">
    <span>Trash this take?</span>
    <button class="yes" id="confirmYes">Trash it</button>
    <button id="confirmNo">Keep recording</button>
  </div>

<script>
  const $ = (id) => document.getElementById(id);
  const fmt = (s) => {
    s = Math.floor(s);
    const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60);
    const mm = h ? String(m).padStart(2, "0") : m;
    return (h ? h + ":" : "") + mm + ":" + String(s % 60).padStart(2, "0");
  };

  let polling;
  async function poll() {
    try {
      const st = await pywebview.api.get_state();
      $("time").innerHTML = `<span class="dot"></span>${fmt(st.elapsed)}`;
      document.body.classList.toggle("paused", st.state === "PAUSED");
      $("icoPause").style.display = st.state === "PAUSED" ? "none" : "";
      $("icoResume").style.display = st.state === "PAUSED" ? "" : "none";
    } catch (e) {}
  }
  window.addEventListener("pywebviewready", () => {
    polling = setInterval(poll, 250);
  });

  $("stop").onclick = () => pywebview.api.stop();
  $("pause").onclick = () => pywebview.api.pause_resume();
  $("restart").onclick = () => pywebview.api.restart();
  $("trash").onclick = () => $("confirm").classList.add("show");
  $("confirmNo").onclick = () => $("confirm").classList.remove("show");
  $("confirmYes").onclick = () => {
    $("confirm").classList.remove("show");
    pywebview.api.trash();
  };
  $("draw").onclick = async () => {
    const on = await pywebview.api.toggle_draw();
    $("draw").classList.toggle("active", on);
  };
  $("cam").onclick = async () => {
    const on = await pywebview.api.toggle_camera();
    $("cam").classList.toggle("active", !on);
  };
  $("blur").onclick = async () => {
    const on = await pywebview.api.toggle_blur();
    $("blur").classList.toggle("active", on);
  };
</script>
</body>
</html>
