<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  /* Loom-style compact launcher: floats top-right of the chosen monitor,
     opened by tray or the record hotkey. Dark, near-opaque, instrument-like. */
  :root {
    --bg: #17181c; --row: #24262c; --row-hi: #2c2f36; --line: #33363d;
    --text: #e8e9eb; --muted: #9aa0a8; --live: #ff4b33; --ai: #a78bfa;
    --mono: "Cascadia Mono", ui-monospace, Consolas, monospace;
  }
  * { box-sizing: border-box; user-select: none; }
  body { margin: 0; background: transparent; overflow: hidden; }
  .panel {
    margin: 6px; background: var(--bg); border: 1px solid var(--line);
    border-radius: 18px; padding: 12px; color: var(--text);
    font: 13.5px system-ui, "Segoe UI", sans-serif;
    box-shadow: 0 10px 34px rgba(0, 0, 0, 0.5);
  }
  .top {
    display: flex; align-items: center; gap: 4px; padding: 0 2px 10px;
    cursor: grab;
  }
  .top .mode {
    width: 38px; height: 32px; border-radius: 9px; border: none;
    background: none; color: var(--muted); display: flex; align-items: center;
    justify-content: center; cursor: pointer;
  }
  .top .mode.active { background: var(--row-hi); color: var(--ai); }
  .top .mode:disabled { color: #4a4e55; cursor: default; }
  .top .spacer { flex: 1; }
  .top .close { color: var(--muted); }
  .top .close:hover { color: var(--text); background: var(--row); }
  .top svg { width: 18px; height: 18px; fill: currentColor; }

  .row {
    display: flex; align-items: center; gap: 10px; background: var(--row);
    border: 1px solid transparent; border-radius: 11px; padding: 0 12px;
    height: 44px; margin-bottom: 8px;
  }
  .row:hover { background: var(--row-hi); }
  .row svg { width: 17px; height: 17px; fill: var(--muted); flex: none; }
  .row select {
    flex: 1; background: transparent; color: var(--text); border: none;
    font: inherit; outline: none; appearance: none; cursor: pointer;
    text-overflow: ellipsis; padding-right: 14px;
  }
  .row select option { background: var(--row); color: var(--text); }
  .row .chev { margin-left: -14px; pointer-events: none; }
  .badge {
    flex: none; font-size: 11.5px; font-weight: 600; padding: 2px 9px;
    border-radius: 6px; background: #3a3d44; color: #fff;
  }
  .badge.off { background: transparent; color: #565a62; border: 1px solid #33363d; }

  .start {
    width: 100%; height: 46px; margin: 4px 0 10px; border: none;
    border-radius: 11px; background: var(--live); color: #fff;
    font: 600 15px system-ui; cursor: pointer;
  }
  .start:hover { filter: brightness(1.07); }

  .bottom { display: flex; gap: 6px; justify-content: space-around; }
  .bottom button {
    flex: 1; background: none; border: none; border-radius: 10px;
    color: var(--muted); font: 12px system-ui; padding: 7px 0 6px;
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    cursor: pointer; position: relative;
  }
  .bottom button:hover { background: var(--row); color: var(--text); }
  .bottom button svg { width: 18px; height: 18px; fill: currentColor; }
  .bottom .dot {
    position: absolute; top: 4px; right: 22%; width: 7px; height: 7px;
    border-radius: 50%; background: var(--live); display: none;
  }
  .bottom button.on .dot { display: block; }
  .bottom button.on { color: var(--ai); }
  .err { color: var(--live); font-size: 12px; min-height: 15px; padding: 2px 4px 0; }
</style>
</head>
<body>
<div class="panel">
  <div class="top pywebview-drag-region">
    <button class="mode active" title="Screen + camera">
      <svg viewBox="0 0 24 24"><path d="M3 5h18a1 1 0 0 1 1 1v10a1 1 0 0 1-1 1h-7v2h3v2H7v-2h3v-2H3a1 1 0 0 1-1-1V6a1 1 0 0 1 1-1z"/></svg>
    </button>
    <button class="mode" disabled title="Camera only — later">
      <svg viewBox="0 0 24 24"><path d="M17 10.5V7a1 1 0 0 0-1-1H4a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-3.5l4 4v-11l-4 4z"/></svg>
    </button>
    <button class="mode" disabled title="Screenshot — later">
      <svg viewBox="0 0 24 24"><path d="M9 3l-1.5 2H4a2 2 0 0 0-2 2v11a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-3.5L15 3H9zm3 5a4.5 4.5 0 1 1 0 9 4.5 4.5 0 0 1 0-9z"/></svg>
    </button>
    <div class="spacer"></div>
    <button class="mode close" id="close" title="Hide (hotkey reopens)">
      <svg viewBox="0 0 24 24"><path d="M6.4 5 5 6.4 10.6 12 5 17.6 6.4 19 12 13.4 17.6 19l1.4-1.4L13.4 12 19 6.4 17.6 5 12 10.6z"/></svg>
    </button>
  </div>

  <label class="row" title="Screen to record">
    <svg viewBox="0 0 24 24"><path d="M3 5h18a1 1 0 0 1 1 1v10a1 1 0 0 1-1 1h-7v2h3v2H7v-2h3v-2H3a1 1 0 0 1-1-1V6a1 1 0 0 1 1-1z"/></svg>
    <select id="monitor" aria-label="Screen"></select>
    <svg class="chev" viewBox="0 0 24 24"><path d="M7 10l5 5 5-5z"/></svg>
  </label>
  <label class="row" title="Camera bubble">
    <svg viewBox="0 0 24 24"><path d="M17 10.5V7a1 1 0 0 0-1-1H4a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-3.5l4 4v-11l-4 4z"/></svg>
    <select id="camera" aria-label="Camera"></select>
    <span class="badge off" id="camBadge">Off</span>
    <svg class="chev" viewBox="0 0 24 24"><path d="M7 10l5 5 5-5z"/></svg>
  </label>
  <label class="row" title="Microphone">
    <svg viewBox="0 0 24 24"><path d="M12 14a3 3 0 0 0 3-3V6a3 3 0 1 0-6 0v5a3 3 0 0 0 3 3zm5-3a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.92V21h2v-3.08A7 7 0 0 0 19 11h-2z"/></svg>
    <select id="mic" aria-label="Microphone"></select>
    <span class="badge off" id="micBadge">Off</span>
    <svg class="chev" viewBox="0 0 24 24"><path d="M7 10l5 5 5-5z"/></svg>
  </label>

  <button class="start" id="start">Start Recording</button>
  <div class="err" id="err"></div>

  <div class="bottom">
    <button id="effects" disabled title="Effects — coming later" style="opacity:.45;cursor:default">
      <svg viewBox="0 0 24 24"><path d="M12 2a2.5 2.5 0 0 1 2.5 2.5A2.5 2.5 0 0 1 12 7a2.5 2.5 0 0 1-2.5-2.5A2.5 2.5 0 0 1 12 2zm-6.5 4A2 2 0 0 1 7.5 8 2 2 0 0 1 5.5 10 2 2 0 0 1 3.5 8a2 2 0 0 1 2-2zm13 0a2 2 0 0 1 2 2 2 2 0 0 1-2 2 2 2 0 0 1-2-2 2 2 0 0 1 2-2zM12 9.5a6.5 6.5 0 0 1 6.5 6.5v5h-13v-5A6.5 6.5 0 0 1 12 9.5z"/></svg>
      Effects
    </button>
    <button id="blur"><span class="dot"></span>
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><circle cx="12" cy="12" r="8" fill="none" stroke="currentColor" stroke-width="1.6" stroke-dasharray="3 3"/></svg>
      Blur
    </button>
    <button id="more" title="Open your library">
      <svg viewBox="0 0 24 24"><circle cx="5" cy="12" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="19" cy="12" r="2"/></svg>
      More
    </button>
  </div>
</div>

<script>
  const $ = (id) => document.getElementById(id);
  let saveTimer;

  async function load() {
    const info = await pywebview.api.get_setup();
    const fill = (sel, items, value, noneLabel) => {
      sel.innerHTML = "";
      if (noneLabel) sel.add(new Option(noneLabel, ""));
      for (const it of items) sel.add(new Option(it.label ?? it, it.value ?? it));
      sel.value = value;
      if (sel.selectedIndex === -1) sel.selectedIndex = 0;
    };
    fill($("monitor"),
      info.monitors.map(m => ({label: `Screen ${m.index} — ${m.width}×${m.height}${m.primary ? " (primary)" : ""}`, value: m.index})),
      String(info.settings.monitor));
    fill($("camera"), info.cameras, info.settings.camera, "No Camera");
    fill($("mic"), info.mics, info.settings.mic, "No Microphone");
    $("blur").classList.toggle("on", info.settings.blur);
    updateBadges();
    if (!info.token_ok) {
      $("err").textContent = "CAPTURE_TOKEN / SERVER_URL missing in .env — uploads will fail.";
    }
  }

  function save() {
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => pywebview.api.save_setup({
      monitor: parseInt($("monitor").value, 10),
      camera: $("camera").value,
      mic: $("mic").value,
      blur: $("blur").classList.contains("on"),
    }), 150);
  }
  function updateBadges() {
    const set = (badge, on) => {
      badge.textContent = on ? "On" : "Off";
      badge.classList.toggle("off", !on);
    };
    set($("camBadge"), !!$("camera").value);
    set($("micBadge"), !!$("mic").value);
  }

  for (const id of ["monitor", "camera", "mic"])
    $(id).addEventListener("change", () => { updateBadges(); save(); });

  $("blur").addEventListener("click", () => {
    $("blur").classList.toggle("on");
    save();
  });
  $("more").addEventListener("click", () => pywebview.api.open_dashboard());
  $("close").addEventListener("click", () => pywebview.api.hide_panel());
  $("start").addEventListener("click", async () => {
    save();
    await new Promise(r => setTimeout(r, 200));
    pywebview.api.start_recording();
  });

  window.addEventListener("pywebviewready", load);
</script>
<script>
  // page zoom persists in the WebView2 profile and breaks fixed layouts
  addEventListener("wheel", (e) => { if (e.ctrlKey) e.preventDefault(); }, { passive: false });
  addEventListener("keydown", (e) => {
    if (e.ctrlKey && ["=", "-", "+", "0"].includes(e.key)) e.preventDefault();
  });
</script>
</body>
</html>
