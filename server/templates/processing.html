<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Processing — DragonRecorder</title>
<link rel="stylesheet" href="/static/shared.css">
<link rel="stylesheet" href="/static/player.css">
</head>
<body>
<div class="centerpage">
  <div class="spin" aria-hidden="true"></div>
  <h1>This recording is still uploading</h1>
  <p>It was just recorded and is on its way up. This page will start playing
     automatically the moment it lands.</p>
</div>
<script>
  const poll = async () => {
    try {
      const r = await fetch(`/api/w/{{ slug }}/state`);
      if (r.ok && (await r.json()).status === "ready") return location.reload();
    } catch (e) {}
    setTimeout(poll, 2500);
  };
  poll();
</script>
</body>
</html>
